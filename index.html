<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>FLL Schedule</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-dragon" aria-hidden="true">
    <svg class="bg-dragon-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" fill="none">
      <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M70 280c-50-60-40-140 15-180 45-35 115-40 180-20" />
        <path d="M265 80l15-32 15 24 20-30 20 26 20-34 20 28 25-17" />
        <path d="M400 45c70-20 140 10 160 65" />
        <path d="M560 110c15 25 5 55-30 65-30 7-55-10-65-35" />
        <path d="M535 78l13-43 7 40" />
        <path d="M530 175l55 13-20 27-50-15" />
        <path d="M265 80c-20 60-45 130-100 170-45 30-90 35-95 30" />
        <path d="M298 88c-48-95-148-70-188-15" />
        <path d="M302 90c-40-88 35-115 88-95" />
        <path d="M175 248l-8 52M235 255l-6 54M310 258l10 52" />
      </g>
    </svg>
  </div>
  <main class="shell">
    <header class="hero">
      <p class="eyebrow">FIRST LEGO League</p>
      <h1>FLL Schedule</h1>
      <p class="lead">Введите номер команды или часть названия — покажем три запуска, судейскую сессию и пит-зону.</p>
    </header>

    <section class="search-block" aria-label="Поиск команды">
      <label class="sr-only" for="q">Поиск</label>
      <div class="input-wrap">
        <svg class="icon-search" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7" />
          <path d="M20 20l-3-3" />
        </svg>
        <input
          id="q"
          type="search"
          autocomplete="off"
          placeholder="Например: 12345 или Robo Falcons"
          inputmode="search"
        />
      </div>
      <p id="hint" class="hint" role="status"></p>
    </section>

    <section id="results" class="results" aria-live="polite"></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
